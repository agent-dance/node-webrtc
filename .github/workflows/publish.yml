name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: BDD acceptance tests
        run: pnpm test:bdd

      - name: Set version from tag
        # strips the leading 'v' from e.g. v1.0.0 → 1.0.0
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version $VERSION"
          node --input-type=module <<EOF
          import { readFileSync, writeFileSync } from 'fs';
          import { readdirSync } from 'fs';
          const pkgDirs = readdirSync('packages').map(d => \`packages/\${d}/package.json\`);
          for (const f of pkgDirs) {
            try {
              const pkg = JSON.parse(readFileSync(f, 'utf8'));
              if (!pkg.private) {
                // update workspace:* deps to the new version
                for (const depField of ['dependencies', 'peerDependencies']) {
                  if (pkg[depField]) {
                    for (const [k, v] of Object.entries(pkg[depField])) {
                      if (v === 'workspace:*') pkg[depField][k] = '$VERSION';
                    }
                  }
                }
                pkg.version = '$VERSION';
                writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
                console.log('Updated', f, 'to', '$VERSION');
              }
            } catch { /* skip missing */ }
          }
          EOF

      - name: Publish all public packages
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
